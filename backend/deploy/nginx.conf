# =============================================================================
# Habitta — Nginx Server Configuration
# =============================================================================
# USAGE (local development):
#   1. Copy to /etc/nginx/sites-available/habitta
#   2. Edit root path and server_name for your machine
#   3. Add to hosts file: 127.0.0.1  habitta.local
#   4. Enable: sudo ln -s /etc/nginx/sites-available/habitta /etc/nginx/sites-enabled/
#   5. Test:   sudo nginx -t
#   6. Reload: sudo systemctl reload nginx
#
# REQUIREMENTS:
#   - PHP-FPM running (php8.2-fpm or similar)
#   - Adjust fastcgi_pass socket path if needed
# =============================================================================

server {
    listen 80;
    server_name habitta.local www.habitta.local;

    # ── Laravel backend (document root = public/) ────────────────────────────
    root /path/to/habitta-laravel/public;
    index index.php index.html;

    # Character set
    charset utf-8;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;

    # ── Laravel: route all requests through index.php ────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM handler ───────────────────────────────────────────────────────
    location ~ \.php$ {
        include        snippets/fastcgi-php.conf;
        # Adjust this to match your PHP-FPM socket:
        fastcgi_pass   unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;

        # Pass Authorization header so Sanctum Bearer tokens reach Laravel
        fastcgi_param  HTTP_AUTHORIZATION $http_authorization;
    }

    # ── Deny access to .htaccess and hidden files ─────────────────────────────
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # ── Static assets (storage symlink) ──────────────────────────────────────
    location /storage/ {
        alias /path/to/habitta-laravel/storage/app/public/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"                    always;
    add_header X-Frame-Options         "SAMEORIGIN"                 always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ── Logs ─────────────────────────────────────────────────────────────────
    error_log  /var/log/nginx/habitta-error.log;
    access_log /var/log/nginx/habitta-access.log;
}

