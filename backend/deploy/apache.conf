# =============================================================================
# Habitta — Apache VirtualHost Configuration
# =============================================================================
# USAGE (local development):
#   1. Copy this file to your Apache sites-available directory:
#        Linux/Mac: /etc/apache2/sites-available/habitta.conf
#        WAMP:      C:\wamp64\bin\apache\apache2.x.x\conf\extra\habitta.conf
#   2. Edit DocumentRoot and <Directory> paths below for your machine.
#   3. Add to hosts file:  127.0.0.1  habitta.local
#   4. Enable site (Linux): sudo a2ensite habitta && sudo systemctl reload apache2
#      WAMP: include this file from httpd.conf or httpd-vhosts.conf
#
# REQUIREMENTS:
#   - mod_rewrite must be enabled   (a2enmod rewrite)
#   - mod_headers must be enabled   (a2enmod headers)
#   - AllowOverride All in <Directory> block (handles public/.htaccess)
#
# PRODUCTION (Linux VPS):
#   - Replace /path/to with the actual server path (e.g. /var/www/habitta-laravel)
#   - Replace habitta.local with your real domain
#   - Add SSL block below and use Certbot for HTTPS
# =============================================================================

<VirtualHost *:80>
    ServerName   habitta.local
    ServerAlias  www.habitta.local

    # ── Laravel backend ──────────────────────────────────────────────────────
    # DocumentRoot must point to the public/ directory, NOT the project root.
    DocumentRoot "/path/to/habitta-laravel/public"

    <Directory "/path/to/habitta-laravel/public">
        Options     -Indexes +FollowSymLinks
        AllowOverride All
        Require     all granted

        # Pass Authorization header through to PHP (required for Sanctum Bearer tokens)
        SetEnvIf Authorization "(.*)" HTTP_AUTHORIZATION=$1
    </Directory>

    # ── React frontend (optional: serve built assets from a sub-path) ────────
    # If you build the React app (npm run build) and want Apache to serve it:
    # Alias /app "/path/to/habitta-react/dist"
    # <Directory "/path/to/habitta-react/dist">
    #     Options -Indexes +FollowSymLinks
    #     AllowOverride None
    #     Require all granted
    #     # SPA fallback: redirect all 404s to index.html
    #     FallbackResource /app/index.html
    # </Directory>

    # ── Logging ──────────────────────────────────────────────────────────────
    ErrorLog  "${APACHE_LOG_DIR}/habitta-error.log"
    CustomLog "${APACHE_LOG_DIR}/habitta-access.log" combined

    # ── Security headers ─────────────────────────────────────────────────────
    <IfModule mod_headers.c>
        Header always set X-Content-Type-Options  "nosniff"
        Header always set X-Frame-Options         "SAMEORIGIN"
        Header always set Referrer-Policy         "strict-origin-when-cross-origin"
    </IfModule>
</VirtualHost>

